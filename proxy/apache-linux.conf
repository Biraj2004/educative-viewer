# Apache HTTPD reverse proxy for EducativeViewer (Linux)
#
# Behavior:
# - Routes known backend API endpoints to Flask (127.0.0.1:5000)
# - Serves all other /api/* paths as static files from STATIC_API_ROOT
# - Routes everything else to Next.js client (127.0.0.1:3000)
#
# Required modules:
#   a2enmod proxy proxy_http rewrite headers alias

<VirtualHost *:80>
    ServerName your-domain.com

    ProxyPreserveHost On

    # Keep /api local unless explicitly proxied by RewriteRule [P]
    ProxyPass /api/ !

    RewriteEngine On

    # Known backend APIs -> Flask
    RewriteCond %{REQUEST_URI} ^/api/(paths/?|paths/[0-9]+/courses/?|projects/?|projects/[0-9]+/course/?|courses/?|course-details/?|topic-details/?)$ [NC,OR]
    RewriteCond %{REQUEST_URI} ^/api/contact/?$ [NC,OR]
    RewriteCond %{REQUEST_URI} ^/api/auth/(signup|login|me|logout|change-password|2fa/setup|theme|progress/topic|progress/course|signup/rollback|2fa/enable|2fa/verify|forgot-password/request|forgot-password/verify|forgot-password/reset)/?$ [NC,OR]
    RewriteCond %{REQUEST_URI} ^/api/admin/(users|set-user-status|set-course-status|test-components|test-components/[0-9]+)/?$ [NC]
    RewriteRule ^/(.*)$ http://127.0.0.1:5000/$1 [P,L]

    # Static images/files under /api
    # Place static assets in: /var/www/educativeviewer/api/
    Alias /api/ /var/www/educativeviewer/api/
    <Directory /var/www/educativeviewer/api>
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # Client app (Next.js)
    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    RequestHeader set X-Forwarded-Proto expr=%{REQUEST_SCHEME}
    RequestHeader set X-Forwarded-Port expr=%{SERVER_PORT}

    ErrorLog ${APACHE_LOG_DIR}/educativeviewer-error.log
    CustomLog ${APACHE_LOG_DIR}/educativeviewer-access.log combined
</VirtualHost>
