# Nginx reverse proxy for EducativeViewer (Windows)
#
# Behavior:
# - Routes known backend API endpoints to Flask (127.0.0.1:5000)
# - Serves all other /api/* paths as static files from STATIC_API_ROOT
# - Routes everything else to Next.js client (127.0.0.1:3000)

upstream educative_client {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream educative_backend {
    server 127.0.0.1:5000;
    keepalive 32;
}

# 1 => send to Flask backend, 0 => serve from static /api directory
map $uri $is_backend_api {
    default 0;

    # Courses/public content APIs
    ~^/api/paths/?$ 1;
    ~^/api/paths/[0-9]+/courses/?$ 1;
    ~^/api/projects/?$ 1;
    ~^/api/projects/[0-9]+/course/?$ 1;
    ~^/api/courses/?$ 1;
    ~^/api/course-details/?$ 1;
    ~^/api/topic-details/?$ 1;

    # Contact API
    ~^/api/contact/?$ 1;

    # Auth APIs
    ~^/api/auth/signup/?$ 1;
    ~^/api/auth/login/?$ 1;
    ~^/api/auth/me/?$ 1;
    ~^/api/auth/logout/?$ 1;
    ~^/api/auth/change-password/?$ 1;
    ~^/api/auth/2fa/setup/?$ 1;
    ~^/api/auth/theme/?$ 1;
    ~^/api/auth/progress/topic/?$ 1;
    ~^/api/auth/progress/course/?$ 1;
    ~^/api/auth/signup/rollback/?$ 1;
    ~^/api/auth/2fa/enable/?$ 1;
    ~^/api/auth/2fa/verify/?$ 1;
    ~^/api/auth/forgot-password/request/?$ 1;
    ~^/api/auth/forgot-password/verify/?$ 1;
    ~^/api/auth/forgot-password/reset/?$ 1;

    # Admin APIs
    ~^/api/admin/users/?$ 1;
    ~^/api/admin/set-user-status/?$ 1;
    ~^/api/admin/set-course-status/?$ 1;
    ~^/api/admin/test-components/?$ 1;
    ~^/api/admin/test-components/[0-9]+/?$ 1;
}

server {
    listen 80;
    server_name localhost;

    # Put static API assets under: C:/inetpub/wwwroot/educativeviewer/api/
    root C:/inetpub/wwwroot/educativeviewer;

    client_max_body_size 25m;

    # /api split-routing: known endpoints -> Flask, others -> static files
    location /api/ {
        error_page 418 = @backend_api;

        if ($is_backend_api = 1) {
            return 418;
        }

        try_files $uri $uri/ =404;
    }

    location @backend_api {
        proxy_pass http://educative_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js app (client)
    location / {
        proxy_pass http://educative_client;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
